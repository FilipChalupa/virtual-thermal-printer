name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  binary:
    name: Build binary on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: virtual-thermal-printer-linux
          - os: macos-latest
            binary: virtual-thermal-printer-macos
          - os: windows-latest
            binary: virtual-thermal-printer-windows.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create SEA bundle
        working-directory: packages/virtual-thermal-printer
        run: npm run sea:bundle

      - name: Create SEA blob
        working-directory: packages/virtual-thermal-printer
        run: node --experimental-sea-config sea-config.json

      - name: Copy node binary (Linux / macOS)
        if: runner.os != 'Windows'
        working-directory: packages/virtual-thermal-printer
        run: cp $(node -e "process.stdout.write(process.execPath)") ${{ matrix.binary }}

      - name: Copy node binary (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/virtual-thermal-printer
        shell: pwsh
        run: Copy-Item (node -e "process.stdout.write(process.execPath)") ${{ matrix.binary }}

      - name: Remove macOS signature
        if: runner.os == 'macOS'
        working-directory: packages/virtual-thermal-printer
        run: codesign --remove-signature ${{ matrix.binary }}

      - name: Inject SEA blob
        working-directory: packages/virtual-thermal-printer
        run: npx postject ${{ matrix.binary }} NODE_SEA_BLOB sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        working-directory: packages/virtual-thermal-printer
        run: codesign --sign - ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: packages/virtual-thermal-printer/${{ matrix.binary }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [binary]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
